<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Semaphore Decoder</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }
        video, canvas {
            position: absolute;
            left: 0;
            top: 0;
            transform: scaleX(-1); /* Mirrors the webcam to match your Python cv2.flip(frame, 1) */
        }
        #webcam {
            opacity: 0; /* Hidden but running; we draw the frames onto the canvas instead */
        }
        .ui-overlay {
            margin-top: 500px; /* Pushes text controls below the video canvas box */
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        h2 { margin: 5px 0; }
        #output { color: #ff3333; font-size: 2rem; font-weight: bold; }
        #category { color: #3388ff; }
    </style>
</head>
<body>

    <h1>Semaphore Flag Signaling Decoder</h1>
    <p>Align your whole body in the camera frame.</p>

    <div class="container">
        <video id="webcam" width="640" height="480" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <div class="ui-overlay">
        <h2>Category: <span id="category">Letter</span></h2>
        <h2>OUTPUT: <span id="output"></span></h2>
    </div>

    <script type="module">
        import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.js";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        
        let poseLandmarker = undefined;
        let lastVideoTime = -1;

        // --- Logic Variables (Your Python equivalents) ---
        let detectedSema4 = [];
        let lastDetectionTime = 0;
        let resetDetectionTime = 0;
        const gestureDelay = 2500; // 2.5 seconds in milliseconds
        let z = "Letter";
        let count = 0;
        let prevLeftAng = 0;
        let prevRightAng = 0;

        // Initialize MediaPipe Pose Landmarker
        async function createPoseLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
            );
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                outputSegmentationMasks: false
            });
            setupCamera();
        }

        // Setup Webcam
        function setupCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        // --- Mathematical Angle Calculation Logic ---
        function calculateAngle(a, b, c) {
            // Vector calculation matching your Python math blocks
            let ba = [a.x - b.x, a.y - b.y];
            let bc = [c.x - b.x, c.y - b.y];

            let dotProduct = ba[0] * bc[0] + ba[1] * bc[1];
            let magnitudeBa = Math.sqrt(ba[0]**2 + ba[1]**2);
            let magnitudeBc = Math.sqrt(bc[0]**2 + bc[1]**2);

            let angle = Math.acos(dotProduct / (magnitudeBa * magnitudeBc));
            let crossProduct = ba[0] * bc[1] - ba[1] * bc[0];
            
            if (crossProduct < 0) {
                angle = -angle;
            }
            return angle * (180 / Math.PI); // Convert radians to degrees
        }

        // Frame Processing Loop
        async function predictWebcam() {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw the mirrored webcam feed onto the canvas background
            canvasCtx.save();
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();

            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                let startTimeMs = performance.now();
                
                const results = poseLandmarker.predictForVideo(video, startTimeMs);
                const drawingUtils = new DrawingUtils(canvasCtx);

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];

                    // Draw the skeleton lines visually over the video frame
                    drawingUtils.drawConnectors(landmarks, PoseLandmarker.POSE_CONNECTIONS);
                    drawingUtils.drawLandmarks(landmarks, { radius: 4, color: "#00FF00" });

                    // Map Indices based on MediaPipe Pose topology
                    const leftShoulder = landmarks[11];
                    const rightShoulder = landmarks[12];
                    const leftElbow = landmarks[13];
                    const rightElbow = landmarks[14];
                    const leftWrist = landmarks[15];
                    const rightWrist = landmarks[16];
                    const leftHip = landmarks[23];
                    const rightHip = landmarks[24];

                    // Compute Angles
                    let leftShoulderAngle = calculateAngle(leftWrist, leftShoulder, leftHip);
                    let rightShoulderAngle = calculateAngle(rightWrist, rightShoulder, rightHip);
                    let leftArmAngle = calculateAngle(leftWrist, leftElbow, leftShoulder);
                    let rightArmAngle = calculateAngle(rightWrist, rightElbow, rightShoulder);

                    let currentTime = performance.now();

                    // --- Your Gesture Logic Decision Tree ---
                    if ((leftArmAngle > 170 && leftArmAngle < 180) || (leftArmAngle < -170 && leftArmAngle > -180)) {
                        if ((rightArmAngle > 170 && rightArmAngle < 180) || (rightArmAngle < -170 && rightArmAngle > -180)) {

                            // Condition A / 1
                            if (leftShoulderAngle > 35 && leftShoulderAngle < 55 && rightShoulderAngle < 0 && rightShoulderAngle > -20) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "A" : "1");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition B / 2
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && rightShoulderAngle < 0 && rightShoulderAngle > -20) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "B" : "2");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition C / 3
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle < 0 && rightShoulderAngle > -20) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "C" : "3");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition D / 4
                            if (Math.abs(leftShoulderAngle) > 170 && Math.abs(leftShoulderAngle) < 180 && rightShoulderAngle < 0 && rightShoulderAngle > -20) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "D" : "4");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition E / 5
                            if (leftShoulderAngle > 0 && leftShoulderAngle < 20 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "E" : "5");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition F / 6
                            if (leftShoulderAngle > 0 && leftShoulderAngle < 20 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "F" : "6");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition G / 7
                            if (leftShoulderAngle > 0 && leftShoulderAngle < 20 && rightShoulderAngle < -35 && rightShoulderAngle > -55) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "G" : "7");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition H / 8
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && rightShoulderAngle > 35 && rightShoulderAngle < 55) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "H" : "8");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition I / 9
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle > 35 && rightShoulderAngle < 55) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "I" : "9");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition J / 0
                            if (Math.abs(leftShoulderAngle) > 170 && Math.abs(leftShoulderAngle) < 180 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    detectedSema4.push(z === "Letter" ? "J" : "0");
                                    lastDetectionTime = currentTime;
                                }
                            }
                            // Condition K
                            if (leftShoulderAngle > 35 && leftShoulderAngle < 55 && Math.abs(rightShoulderAngle) > 170 && Math.abs(rightShoulderAngle) < 180) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("K"); lastDetectionTime = currentTime; }
                            }
                            // Condition L
                            if (leftShoulderAngle > 35 && leftShoulderAngle < 55 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("L"); lastDetectionTime = currentTime; }
                            }
                            // Condition M
                            if (leftShoulderAngle > 35 && leftShoulderAngle < 55 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("M"); lastDetectionTime = currentTime; }
                            }
                            // Condition N
                            if (leftShoulderAngle > 35 && leftShoulderAngle < 55 && rightShoulderAngle < -35 && rightShoulderAngle > -55) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("N"); lastDetectionTime = currentTime; }
                            }
                            // Condition O
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle > 80 && rightShoulderAngle < 100) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("O"); lastDetectionTime = currentTime; }
                            }
                            // Condition P
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && Math.abs(rightShoulderAngle) > 170 && Math.abs(rightShoulderAngle) < 180) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("P"); lastDetectionTime = currentTime; }
                            }
                            // Condition Q
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("Q"); lastDetectionTime = currentTime; }
                            }
                            // Condition R
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("R"); lastDetectionTime = currentTime; }
                            }
                            // Condition S
                            if (leftShoulderAngle > 80 && leftShoulderAngle < 100 && rightShoulderAngle < -35 && rightShoulderAngle > -55) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("S"); lastDetectionTime = currentTime; }
                            }
                            // Condition T
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && Math.abs(rightShoulderAngle) > 170 && Math.abs(rightShoulderAngle) < 180) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("T"); lastDetectionTime = currentTime; }
                            }
                            // Condition U
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("U"); lastDetectionTime = currentTime; }
                            }
                            // Condition V
                            if (Math.abs(leftShoulderAngle) > 170 && Math.abs(leftShoulderAngle) < 180 && rightShoulderAngle < -35 && rightShoulderAngle > -55) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("V"); lastDetectionTime = currentTime; }
                            }
                            // Condition W
                            if (leftShoulderAngle < -80 && leftShoulderAngle > -100 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("W"); lastDetectionTime = currentTime; }
                            }
                            // Condition X
                            if (leftShoulderAngle < -35 && leftShoulderAngle > -55 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("X"); lastDetectionTime = currentTime; }
                            }
                            // Condition Y
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("Y"); lastDetectionTime = currentTime; }
                            }
                            // Condition Z
                            if (leftShoulderAngle < -35 && leftShoulderAngle > -55 && rightShoulderAngle < -80 && rightShoulderAngle > -100) {
                                if (currentTime - lastDetectionTime > gestureDelay) { if (z === "Letter") detectedSema4.push("Z"); lastDetectionTime = currentTime; }
                            }

                            // Switch to Letters Mode
                            if (leftShoulderAngle < 0 && leftShoulderAngle > -10 && rightShoulderAngle > 0 && rightShoulderAngle < 10) {
                                if (currentTime - lastDetectionTime > gestureDelay) { z = "Letter"; lastDetectionTime = currentTime; }
                            }
                            // Switch to Numbers Mode
                            if (Math.abs(leftShoulderAngle) > 170 && Math.abs(leftShoulderAngle) < 180 && rightShoulderAngle < -125 && rightShoulderAngle > -145) {
                                if (currentTime - lastDetectionTime > gestureDelay) { z = "Number"; lastDetectionTime = currentTime; }
                            }
                            // Backspace / Pop (With fixed crash safety check)
                            if (leftShoulderAngle > 125 && leftShoulderAngle < 145 && rightShoulderAngle < -35 && rightShoulderAngle > -55) {
                                if (currentTime - lastDetectionTime > gestureDelay) {
                                    if (detectedSema4.length > 0) detectedSema4.pop();
                                    lastDetectionTime = currentTime;
                                }
                            }

                            // Tracking baseline frame differences for resetting array
                            if (currentTime - resetDetectionTime > 500) {
                                prevLeftAng = leftShoulderAngle;
                                prevRightAng = rightShoulderAngle;
                                resetDetectionTime = currentTime;
                            }

                            // Clear Screen Action (4 rapid extreme frame shifts)
                            if (currentTime - lastDetectionTime > gestureDelay) {
                                if (Math.abs(prevLeftAng - leftShoulderAngle) > 100 && Math.abs(prevRightAng - rightShoulderAngle) > 100) {
                                    count++;
                                    if (count === 4) {
                                        detectedSema4 = [];
                                        count = 0;
                                        lastDetectionTime = currentTime;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // Update UI Elements dynamically
            document.getElementById("output").innerText = detectedSema4.join("");
            document.getElementById("category").innerText = z;

            // Loop back to next camera frame
            window.requestAnimationFrame(predictWebcam);
        }

        // Start application
        createPoseLandmarker();
    </script>
</body>
</html>
